                  - code [ref=e1234]: "import re def check_password_strength(password): \"\"\"检测密码强度\"\"\" score = 0 feedback = [] # 长度检查 if len(password) >= 8: score += 1 else: feedback.append(\"密码长度至少需要8位\") if len(password) >= 12: score += 1 # 包含大写字母 if re.search(r\"[A-Z]\", password): score += 1 else: feedback.append(\"建议包含大写字母\") # 包含小写字母 if re.search(r\"[a-z]\", password): score += 1 else: feedback.append(\"建议包含小写字母\") # 包含数字 if re.search(r\"[0-9]\", password): score += 1 else: feedback.append(\"建议包含数字\") # 包含特殊字符 if re.search(r\"[!@#$%^&*(),.?\":{}|<>]\", password): score += 1 else: feedback.append(\"建议包含特殊字符\") # 评估等级 if score <= 2: level = \"弱\" color = \"红色\" elif score <= 4: level = \"中等\" color = \"黄色\" else: level = \"强\" color = \"绿色\" return { \"score\": score, \"level\": level, \"color\": color, \"feedback\": feedback } # 测试 password = input(\"请输入密码: \") result = check_password_strength(password) print(f\"密码强度: {result['level']} ({result['color']})\") if result[\"feedback\"]: print(\"建议:\") for tip in result[\"feedback\"]: print(f\" - {tip}\")"
